<div style="display:flex;gap:10px;margin-bottom:20px;justify-content:center;">
    <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
    <button class="btn" onclick="document.getElementById('pdfInput').click()" style="background:#FFD600;color:#3C3C3B;width:200px">
        📄 CARICA PDF LEZIONE
    </button>
</div>

<script>
// La funzione magica che legge il PDF e lo manda a Claude
document.getElementById('pdfInput').onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    // Mostriamo il caricamento
    document.getElementById('loading').style.display = 'flex';
    
    const reader = new FileReader();
    reader.onload = async function() {
        const base64 = reader.result.split(',')[1];
        
        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20241022",
                    max_tokens: 4000,
                    messages: [{
                        role: "user",
                        content: [
                            {
                                type: "document",
                                source: {
                                    type: "base64",
                                    media_type: "application/pdf",
                                    data: base64
                                }
                            },
                            {
                                type: "text",
                                text: "Analizza questa lezione Kids&Us e genera la tabella del planner in formato JSON. Mantieni il Target Language evidenziato."
                            }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.content && data.content[0]) {
                // Qui chiamiamo la tua funzione originale per mostrare la tabella
                // (Assicurati che la funzione parseResponse esista ancora sotto)
                parseResponse(data.content[0].text);
            }
        } catch (err) {
            alert("Errore: " + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    };
    reader.readAsDataURL(file);
};
</script>
